name: "4. Publish MCP Registry"

on:
  workflow_dispatch:

permissions:
  contents: read   # checkout only
  id-token: write  # authenticate to the MCP Registry via GitHub OIDC

jobs:
  registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # Run last: the registry validates that the NuGet and npm packages already exist and are indexed.
      - name: Publish
        run: |
          set -euo pipefail
          version=v1.8.0
          sha256=1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${version}/mcp-publisher_linux_amd64.tar.gz" -o mcp-publisher.tar.gz
          echo "${sha256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar -xzf mcp-publisher.tar.gz mcp-publisher
          cp .mcp/server.json ./server.json
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
