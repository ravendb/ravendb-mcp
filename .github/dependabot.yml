version: 2
updates:
  # .NET package references (RavenDB.Client, ModelContextProtocol, Microsoft.Extensions.*)
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Action versions pinned in .github/workflows/*
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
